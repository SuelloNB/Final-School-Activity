<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Registration Form</title>
    <style>
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>

<body style="font-size: large;">
    <img src="./assets/logo.png" alt="UC logo" style="width: 200px; margin-left: 300px;">
    <h1 style="color: red; text-align: center;">Sample Registration Form Using Table</h1>
    <table align="center" cellpadding="5">
        <tr>
            <td></td>
            <td colspan="2">
                <label><input type="radio" name="extension" checked /> Mr.</label>
                <label><input type="radio" name="extension" /> Mrs.</label>
                <label><input type="radio" name="extension" /> Ms.</label>
                </div>
            </td>
        </tr>
        <tr>
            <td>MailAddress2</td>
            <td>
                <label for="mailaddress2" class="visually-hidden">Mail Address 2</label>
                <input type="text" id="mailaddress2" required>
            </td>
        </tr>
        <tr>
            <td>City</td>
            <td>
                <label for="city" class="visually-hidden">City</label>
                <input type="text" id="city" required>
            </td>
        </tr>
        <tr>
            <td>Province</td>
            <td>
                <label for="province" class="visually-hidden">Province</label>
                <select id="province" name="province">
                    <option>Cebu</option>
                    <option>Davao</option>
                    <option>Leyte</option>
                    <option>Laguna</option>
                    <option>Cavite</option>
                </select>
            </td>
        </tr>
        <tr>
            <td>Zip</td>
            <td>
                <label for="zip" class="visually-hidden">Zip</label>
                <input type="number" id="zip" required>
            </td>
        </tr>
        <tr>
            <td>Upload Photo</td>
            <td>
                <label for="photo" class="visually-hidden">Upload Photo</label>
                <input type="file" id="photo" required>
            </td>
        </tr>
        <tr>
            <td>E-mail</td>
            <td>
                <label for="email" class="visually-hidden">E-mail</label>
                <input type="email" id="email" required>
            </td>
        </tr>
        <tr>
            <td>Mobile</td>
            <td>
                <label for="mobile" class="visually-hidden">Mobile</label>
                <input type="number" id="mobile" placeholder="+63" required>
            </td>
        </tr>
        <tr>
            <td>Languages known</td>
            <td>
                <label><input type="checkbox" id="lang-english" checked> English</label>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <label><input type="checkbox" id="lang-cebuano" checked> Cebuano</label>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <label><input type="checkbox" id="lang-ilonggo"> Ilonggo</label>
            </td>
        </tr>
        <tr>
            <td></td>
            <td>
                <label><input type="checkbox" id="lang-ilocano"> Ilocano</label>
            </td>
        </tr>
        <tr>
            <td></td>
            <td><label><input type="checkbox" checked> Cebuano</label></td>
        </tr>
        <tr>
            <td></td>
            <td><label><input type="checkbox"> Ilonggo</label></td>
        </tr>
        <tr>
            <td></td>
            <td><label><input type="checkbox"> Ilocano</label></td>
        </tr>
        <tr>
            <td>Additional Information</td>
            <td><textarea placeholder="Optional"></textarea></td>
        </tr>
        <tr>
            <td></td>
            <td colspan="2" align="left">
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>
            </td>
        </tr>
    </table>
</body>

</html>
